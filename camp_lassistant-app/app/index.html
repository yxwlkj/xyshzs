<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校园生活助手</title>
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="App.css">
</head>
<body>
  <div class="container home-container">
    <h1>校园生活助手</h1>
    <div class="card">
      <div class="home-buttons">
        <button class="btn btn-success" onclick="window.location.href='order.html'">
          <i class="fa fa-shopping-cart"></i> 订单管理
        </button>
        <button class="btn btn-primary" onclick="window.location.href='forum.html'">
          <i class="fa fa-comments"></i> 校园论坛
        </button>
        <button class="btn btn-warning" onclick="window.location.href='chat.html'">
          <i class="fa fa-wechat"></i> 在线聊天
        </button>
        <button class="btn btn-danger" onclick="logout()">
          <i class="fa fa-sign-out"></i> 退出登录
        </button>
      </div>
    </div>
  </div>

  <!-- 底部导航栏 -->
  <div class="bottom-nav">
    <a href="index.html" class="active">
      <i class="fa fa-home"></i>
      <span>首页</span>
    </a>
    <a href="order.html">
      <i class="fa fa-shopping-cart"></i>
      <span>订单</span>
    </a>
    <a href="forum.html">
      <i class="fa fa-comments"></i>
      <span>论坛</span>
    </a>
    <a href="chat.html">
      <i class="fa fa-wechat"></i>
      <span>聊天</span>
    </a>
  </div>

  <script>
    function logout() {
      localStorage.removeItem('token');
      window.location.href = 'login.html';
    }
  </script>
</body>
</html>
