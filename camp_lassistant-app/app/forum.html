<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校园论坛</title>
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="App.css">
</head>
<body>
  <div class="container">
    <h2>校园论坛</h2>
    <div class="card">
      <h3>发布新帖子</h3>
      <div class="form-group">
        <label>帖子标题</label>
        <input type="text" class="form-control" placeholder="输入帖子标题">
      </div>
      <div class="form-group">
        <label>帖子内容</label>
        <textarea class="form-control" rows="4" placeholder="输入帖子内容"></textarea>
      </div>
      <button class="btn btn-primary">发布帖子</button>
    </div>

    <div class="card">
      <h3>帖子列表</h3>
      <ul class="list-group"></ul>
    </div>
  </div>

  <!-- 底部导航栏 -->
  <div class="bottom-nav">
    <a href="index.html">
      <i class="fa fa-home"></i>
      <span>首页</span>
    </a>
    <a href="order.html">
      <i class="fa fa-shopping-cart"></i>
      <span>订单</span>
    </a>
    <a href="forum.html" class="active">
      <i class="fa fa-comments"></i>
      <span>论坛</span>
    </a>
    <a href="chat.html">
      <i class="fa fa-wechat"></i>
      <span>聊天</span>
    </a>
  </div>
</body>
</html>
