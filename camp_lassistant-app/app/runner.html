<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Runner Dashboard</title>
  <link rel="stylesheet" href="/App.css">
  <link rel="stylesheet" href="/order/Order.css">
</head>
<body>
  <div class="container">
    <nav>
      <a href="index.html">首页</a>
      <a href="chat.html">聊天</a>
      <a href="order.html">订单</a>
      <a href="runner.html">跑腿</a>
      <a href="forum.html">论坛</a>
    </nav>
    <h2>跑腿员界面</h2>
    <div id="status" style="min-height:1em"></div>
    <div style="margin-bottom:10px;">
      <label>姓名： <input id="runnerName" placeholder="跑腿员"></label>
      <button id="setRunner">设置</button>
    </div>
    <h3>可接订单</h3>
    <div id="availableOrders"></div>
    <h3>我的订单</h3>
    <div id="myOrders"></div>
  </div>
  <script>
    let runner = '';
    function showStatus(msg,isError=false){const s=document.getElementById('status');s.textContent=msg;s.style.color=isError?'red':'green';setTimeout(()=>{s.textContent='';},3000);}    

    document.getElementById('setRunner').addEventListener('click', ()=>{
      runner=document.getElementById('runnerName').value.trim();
      if(runner){
        localStorage.setItem('runner', runner);
        loadLists();
      }
    });
    document.getElementById('runnerName').value = localStorage.getItem('runner')||'';
    runner = document.getElementById('runnerName').value;
    if(runner) loadLists();

    async function loadLists(){
      if(!runner) return;
      // available
      const avail = await fetch('/api/orders/available').then(r=>r.json());
      const ao = document.getElementById('availableOrders');
      if(avail.length===0) ao.innerHTML='<p><em>暂无可接订单</em></p>';
      else {
        ao.innerHTML = avail.map(o=>{
          return `<div class=\"order-item\" data-id=\"${o.orderId}\">`+
                 `#${o.orderId} ${o.item} x${o.quantity} [${o.type}] 取件:${o.pickup||'-'} 目的地:${o.destination||'-'} 校区:${o.campus||'-'}`+
                 ` <button class=\"accept\" data-id=\"${o.orderId}\">接单</button>`+
                 `</div>`;
        }).join('');
      }
      // my orders
      const all = await fetch('/api/orders').then(r=>r.json());
      const mine = all.filter(o=>o.runner===runner);
      const mo = document.getElementById('myOrders');
      const statusNames = {pending:'待处理',assigned:'已指派',completed:'已完成'};
      if(mine.length===0) mo.innerHTML='<p><em>你还没有接单</em></p>';
      else {
        mo.innerHTML = mine.map(o=>{
          const statusText = statusNames[o.status] || o.status;
          return `<div class=\"order-item${o.status==='completed'? ' completed':''}\" data-id=\"${o.orderId}\">`+
                 `#${o.orderId} ${o.item} x${o.quantity} [${o.type}] 状态:${statusText}`+
                 (o.status!=='completed' ? ` <button class=\"complete\" data-id=\"${o.orderId}\">✔ 完成</button>` : '')+
                 `</div>`;
        }).join('');
      }
    }

    document.body.addEventListener('click', async e=>{
      if(e.target.classList.contains('accept')){
        const id = e.target.dataset.id;
        await fetch('/api/orders/'+id, {method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({runner, status:'assigned'})});
        showStatus('订单已接');
        loadLists();
      }
      if(e.target.classList.contains('complete')){
        const id = e.target.dataset.id;
        await fetch('/api/orders/'+id, {method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status:'completed'})});
        showStatus('订单已标记为完成');
        loadLists();
      }
    });

    // highlight nav
    document.querySelectorAll('nav a').forEach(a=>{
      if (a.getAttribute('href') === 'runner.html') a.style.fontWeight = 'bold';
    });
  </script>
</body>
</html>
