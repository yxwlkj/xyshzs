<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校园生活助手 - 登录</title>
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="App.css">
  <style>
    /* 登录页专属样式 */
    .login-card {
      max-width: 450px;
      margin: 80px auto;
      padding: 30px;
    }
    .w-100 {
      width: 100%;
    }
    .text-muted {
      color: #64748b;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card login-card">
      <h2>用户登录</h2>
      <div class="form-group">
        <label for="username">用户名</label>
        <input type="text" id="username" class="form-control" placeholder="请输入用户名（user1/runner1）">
      </div>
      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" class="form-control" placeholder="请输入密码（123456）">
      </div>
      <button class="btn btn-primary w-100" onclick="login()">
        <i class="fa fa-sign-in"></i> 登录
      </button>
      <p class="text-center mt-20 text-muted">
        测试账号：user1/123456 或 runner1/123456
      </p>
    </div>
  </div>

  <script>
    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!username || !password) {
        alert('用户名和密码不能为空！');
        return;
      }

      try {
        // 调用后端登录接口
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });

        const result = await response.json();

        if (result.success) {
          // 保存token，跳转到首页
          localStorage.setItem('token', result.token);
          alert('登录成功！');
          window.location.href = 'index.html';
        } else {
          alert('登录失败：' + (result.message || '未知错误'));
        }
      } catch (err) {
        alert('登录请求失败：' + err.message);
      }
    }
  </script>
</body>
</html>
