<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>订单管理</title>
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="App.css">
</head>
<body>
  <div class="container">
    <h2>订单管理</h2>
    <div class="card">
      <h3>创建新订单</h3>
      <div class="form-group">
        <label>订单标题</label>
        <input type="text" class="form-control" placeholder="例如：买水、取快递">
      </div>
      <div class="form-group">
        <label>订单详情</label>
        <textarea class="form-control" rows="4" placeholder="详细描述需求、地点等"></textarea>
      </div>
      <button class="btn btn-primary">提交订单</button>
    </div>

    <div class="card">
      <h3>我的订单列表</h3>
      <ul class="list-group">
        <li class="list-group-item">
          <h4>测试订单-买水</h4>
          <p>内容：请帮忙买2瓶矿泉水，送到教学楼A区</p>
          <p>创建人：user1</p>
          <span class="badge badge-pending">待接单</span>
          <button class="btn btn-success mt-10">接单</button>
        </li>
      </ul>
    </div>
  </div>

  <!-- 底部导航栏 -->
  <div class="bottom-nav">
    <a href="index.html">
      <i class="fa fa-home"></i>
      <span>首页</span>
    </a>
    <a href="order.html" class="active">
      <i class="fa fa-shopping-cart"></i>
      <span>订单</span>
    </a>
    <a href="forum.html">
      <i class="fa fa-comments"></i>
      <span>论坛</span>
    </a>
    <a href="chat.html">
      <i class="fa fa-wechat"></i>
      <span>聊天</span>
    </a>
  </div>
</body>
</html>
