<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Orders</title>
  <link rel="stylesheet" href="/App.css">
  <link rel="stylesheet" href="/order/Order.css">
</head>
<body>
  <div class="container">
    <nav>
      <a href="index.html">й¶Цй°µ</a>
      <a href="chat.html">иБКе§©</a>
      <a href="order.html">иЃҐеНХ</a>
      <a href="runner.html">иЈСиЕњ</a>
      <a href="forum.html">иЃЇеЭЫ</a>
    </nav>
    <h2>иЈСиЕњиЃҐеНХ</h2>
    <div id="status" style="min-height:1em;"></div>
    <div id="orders"></div>
    <form id="orderForm">
      <input name="item" placeholder="еХЖеУБ" required>
      <input name="quantity" type="number" placeholder="жХ∞йЗП" required>
      <select name="type" required>
        <option value="general">жЩЃйАЪ</option>
        <option value="pickup">еПЦдїґ</option>
        <option value="delivery">йАБиіІ</option>
        <option value="shopping">дї£иі≠</option>
      </select>
      <input name="pickup" placeholder="еПЦдїґеЬ∞еЭА/еЬ∞зВє">
      <input name="destination" placeholder="зЫЃзЪДеЬ∞еЬ∞еЭА/еЬ∞зВє">
      <input name="campus" placeholder="ж†°еЫ≠" value="Main" required>
      <button type="submit">жПРдЇ§</button>
    </form>
  </div>
  <script>
    function showStatus(msg,isError=false){const s=document.getElementById('status');s.textContent=msg;s.style.color=isError?'red':'green';setTimeout(()=>{s.textContent='';},3000);}    
    async function load() {
      const statusNames = {pending:'еЊЕе§ДзРЖ',assigned:'еЈ≤жМЗжіЊ',completed:'еЈ≤еЃМжИР'};
      const res = await fetch('/api/orders');
      const orders = await res.json();
      const div = document.getElementById('orders');
      if (orders.length === 0) {
        div.innerHTML = '<p><em>жЪВжЧ†иЃҐеНХгАВ</em></p>';
      } else {
        div.innerHTML = orders.map(o=>{
          const runnerInfo = o.runner ? ` <span class="runner">(иЈСиЕњеСШ: ${o.runner})</span>` : '';
          const statusText = statusNames[o.status] || o.status;
          return `<div class=\"order-item${o.status==='completed'? ' completed':''}\" data-id=\"${o.orderId}\">`+
                 `#${o.orderId}: ${o.item} x${o.quantity} [${o.type}]`+
                 ` еПЦдїґ:${o.pickup||'-'} зЫЃзЪДеЬ∞:${o.destination||'-'} ж†°еМЇ:${o.campus||'-'}`+
                 ` зКґжАБ:${statusText}${runnerInfo}`+
                 ` <button class=\"toggle\" data-id=\"${o.orderId}\">${o.status==='completed' ? 'вЖЇ' : 'вЬФ'}</button>`+
                 `</div>`;
        }).join('');
      }
      // add toggle handler
      document.querySelectorAll('.toggle').forEach(btn=>{
        btn.addEventListener('click', async e=>{
          const id = btn.dataset.id;
          const itemDiv = btn.closest('.order-item');
          const current = itemDiv.textContent.includes('(completed)');
          const newStatus = current ? 'pending' : 'completed';
          await fetch('/api/orders/'+id, {method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status:newStatus})});
          showStatus('иЃҐеНХеЈ≤жЫіжЦ∞');
          load();
        });
      });
    }
    document.getElementById('orderForm').addEventListener('submit', async e=>{
      e.preventDefault();
      const form = e.target;
      localStorage.setItem('lastOrderItem', form.item.value);
      const data = {
        item: form.item.value,
        quantity: Number(form.quantity.value),
        type: form.type.value,
        pickup: form.pickup.value,
        destination: form.destination.value,
        campus: form.campus.value
      };
      await fetch('/api/orders', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
      form.reset();
      load();
      showStatus('иЃҐеНХеЈ≤жПРдЇ§');
    });
    // restore last item
    document.getElementById('orderForm').item.value = localStorage.getItem('lastOrderItem') || '';    load();
    // nav highlight
    document.querySelectorAll('nav a').forEach(a=>{
      if (a.getAttribute('href') === 'order.html') a.style.fontWeight = 'bold';
    });
  </script>
</body>
</html>
