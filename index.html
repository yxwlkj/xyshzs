<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校园跑腿</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    body {
      background-color: #f8f9fa;
    }
    .navbar {
      background-color: #2c3e50;
      color: white;
      padding: 16px;
      text-align: center;
    }
    .order-card {
      background: white;
      margin: 12px;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .order-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }
    .order-address {
      color: #666;
      margin: 4px 0;
    }
    .order-price {
      color: #ff6b35;
      font-size: 20px;
      font-weight: bold;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <h1>校园跑腿</h1>
  </div>
  <div class="order-list">
    <div class="order-card">
      <div class="order-title">骑手订单 - 快递代取</div>
      <div class="order-address">取货地址：学生宿舍 3 栋</div>
      <div class="order-address">收货地址：图书馆 2 楼</div>
      <div class="order-price">¥ 10.00</div>
    </div>
    <div class="order-card">
      <div class="order-title">骑手订单 - 外卖配送</div>
      <div class="order-address">取货地址：一食堂 2 楼</div>
      <div class="order-address">收货地址：教学楼 5 楼</div>
      <div class="order-price">¥ 8.00</div>
    </div>
  </div>
</body>
</html>
